name: Autonomous Code Review
on:
  pull_request:
    paths: ["**.py"]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install .
      - name: Run multi-agent review on changed files
        run: |
          set -e
          BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
          for f in $(git diff --name-only --diff-filter=ACM $BASE -- '*.py'); do
            if git cat-file -e $BASE:$f 2>/dev/null; then
              git show $BASE:$f > /tmp/old.py
              reviewagent "$f" --old /tmp/old.py --json >> findings.json || true
            else
              reviewagent "$f" --json >> findings.json || true
            fi
          done
      - name: Post findings as PR comment
        if: hashFiles('findings.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '### 🤖 Autonomous Code Review\n```json\n' +
              fs.readFileSync('findings.json','utf8').slice(0, 60000) + '\n```';
            github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body });

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install .[dev] && pytest tests/ -q
